<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin panel</title>
    <link rel="stylesheet" href="/ui.css">
    <meta name="viewport" content="width=device-width"/>
</head>
<body>
 <ul>
  <li><a class="active" href="/admin/index.html">Timetable</a></li>
  <li><a href="/admin/screens.html">Screens</a></li>
  <li><a href="/admin/messages.html">Messages</a></li>
  <li><a href="/admin/system_log.html">System Log</a></li>
  <li><a href="/admin/logout">Log Out</a></li>
</ul>
<script>
    const urlParams = new URLSearchParams(window.location.search);

    function filter() {
        let loc = document.getElementById("loc_filter").value;
        iframes = document.getElementsByTagName("iframe");

        iframes[0].src="/admin/time_table?loc="+loc;
        iframes[1].src="/admin/time_table?prefab=true&loc="+loc;
    }

    function set_filter() {
        document.getElementById('loc_filter').value = urlParams.get('filter');
    }

    function pass_filter() {
        let filter_elems = document.getElementsByClassName("filter")
        for(let i=0; i<filter_elems.length; i++){
            filter_elems[i].value = document.getElementById("loc_filter").value;
        }
    }
</script>
<div class="centered" style="position: absolute; width: 100%;top: 4em">
    <label>only show: </label>
    <input type="text" placeholder="keep empty for all locations" id="loc_filter">
    <input type="button" value="Filter" onclick="pass_filter();filter();">
</div>

<table style="width: 100%;">
    <tr style="height: 2em"><th>active Timetable:</th><th>edited Timetable:</th></tr>
    <tr>
        <td>
            <iframe src="/admin/time_table" style="width: 97%;height: 60vh;"></iframe>
        </td>
        <td>
            <iframe src="/admin/time_table?prefab=true" style="width: 97%;height: 60vh;"></iframe>
        </td>
    </tr>
</table>

<table style="width: 100%">
    <tr>
        <td>
            <div>
                <form action="/admin/edit_event" method="post">
                    <input type="text" name="id" id="id" style="display: none;">
                    <input type="text" name="filter" class="filter" hidden="hidden">
                    <table>
                        <tr>
                            <td>Event</td>
                            <td>Description</td>
                            <td>Type</td>
                            <td>Start</td>
                            <td>Length</td>
                            <td>Location</td>
                            <td></td>
                        </tr>
                        <tr>
                            <td><input type="text" minlength="3" name="event" id="event" class="event"></td>
                            <td><input type="text" name="description" id="desc" class="desc"></td>
                            <td><input type="text" name="type" id="type" class="type"></td>
                            <td><input type="datetime-local" name="start" id="start" class="start"></td>
                            <td><input type="number" min="1" name="duration" id="duration" class="duration"></td>
                            <td><input type="text" min="3" name="location" id="loc" class="location"></td>
                            <td><input type="submit" value="Update" class="btn"></td>
                        </tr>
                    </table>
                </form>
            </div>
            <div>
                <form action="/admin/add_event" method="post">
                    <input type="text" name="filter" class="filter" hidden="hidden">
                    <table>
                        <tr>
                            <td>Event</td>
                            <td>Description</td>
                            <td>Type</td>
                            <td>Start</td>
                            <td>Length</td>
                            <td>Location</td>
                            <td></td>
                        </tr>
                        <tr>
                            <td><input type="text" minlength="3" name="event" class="event"></td>
                            <td><input type="text" name="description" class="desc"></td>
                            <td><input type="text" name="type" class="type"></td>
                            <td><input type="datetime-local" name="start" class="start"></td>
                            <td><input type="number" min="1" name="duration" class="duration"></td>
                            <td><input type="text" min="3" name="location" class="location"></td>
                            <td><input type="submit" value="Add" class="btn"></td>
                        </tr>
                    </table>
                </form>
            </div>
            <div>
                <form action="/admin/delete_event" method="post">
                    <input type="text" name="filter" class="filter" hidden="hidden">
                    <table>
                        <tr>
                            <td>ID</td>
                            <td></td>
                        </tr>
                        <tr>
                            <td><input type="text" name="id"></td>
                            <td><input type="submit" value="Delete"></td>
                        </tr>
                    </table>
                </form>
            </div>
        </td>
        <td>
            <div>
                <form action="/admin/reset_table" method="post">
                    <input type="submit" value="revert all changes" class="btn" style="height: 10vh">
                </form>
            </div>
            <div>
                <form action="/admin/submit_table" method="post">
                    <input type="submit" value="commit all changes" class="btn" style="height: 10vh">
                </form>
            </div>
        </td>
    </tr>
</table>

<script>
    set_filter();
    filter();
    pass_filter();
</script>
</body>
</html>
